### ~/.tmux.conf ###

# =============== GENERAL SETTINGS ===============

# Prefix: Ctrl-A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable 256 colors and truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:RGB"

# Mouse support (resize, select, scroll)
set -g mouse on

# Use vi-style key bindings everywhere
set -g status-keys vi
setw -g mode-keys vi

# Allow faster command sequences
set -s escape-time 0

# Pane border colors
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour242"

# Message styling
set -g message-style "bg=colour234,fg=colour223"

# Better scrollback buffer
set -g history-limit 10000

# =============== STATUS BAR (OLED Low Contrast Theme) ===============

# ==========================
#   TMUX SOLARIZED LIGHT
# ==========================

# Solarized Light colors
set -g status-style bg='#eee8d5',fg='#586e75'

# Window status
setw -g window-status-style bg='#eee8d5',fg='#657b83'
setw -g window-status-current-style bg='#93a1a1',fg='#fdf6e3',bold

# Pane borders
set -g pane-border-style fg='#93a1a1'
set -g pane-active-border-style fg='#268bd2'

# Message style
set -g message-style bg='#fdf6e3',fg='#dc322f'

# Status bar content
set -g status-left '#[bg=#268bd2,fg=#fdf6e3,bold] #S #[default] '
set -g status-right '#[fg=#586e75]%H:%M #[bg=#93a1a1,fg=#fdf6e3] %Y-%m-%d '
set -g status-left-length 20
set -g status-right-length 50

# Window list format
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '


# =============== SPLITS AND WINDOW BINDINGS ===============

# Split panes
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Resize panes with Alt + arrows
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 2
bind -n M-Down resize-pane -D 2

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Switch between last two panes
bind Tab last-pane

# Create / close windows
bind c new-window
bind x kill-pane
bind & kill-window

# Quick reload of config
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"


# =============== QUALITY OF LIFE ===============

# Auto rename off (so window names stay what you set)
set-option -g allow-rename off

# Better window switching
bind -r n next-window
bind -r p previous-window
bind -r 0 select-window -t 0
bind -r 1 select-window -t 1
bind -r 2 select-window -t 2
bind -r 3 select-window -t 3
bind -r 4 select-window -t 4
bind -r 5 select-window -t 5
bind -r 6 select-window -t 6
bind -r 7 select-window -t 7
bind -r 8 select-window -t 8
bind -r 9 select-window -t 9

# Bell alerts off
set -g visual-bell off
set -g bell-action none


### =============== FIXED SYSTEM CLIPBOARD INTEGRATION ===============

# Make sure vi mode is active
setw -g mode-keys vi

# Start selection with 'v' in copy mode (like Vim)
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# Paste from system clipboard
bind-key -T root C-p run "xclip -o -sel clipboard | tmux load-buffer - && tmux paste-buffer"

# Automatically enter copy mode when scrolling
setw -g mouse on

set -g pane-active-border-style "fg=colour178"



# Copy to both clipboards safely in background
unbind -T copy-mode-vi y
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel \; \
  run-shell "tmux save-buffer - | xclip -sel clipboard -i >/dev/null 2>&1 & xclip -sel primary -i >/dev/null 2>&1 &"

unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel \; \
  run-shell "tmux save-buffer - | xclip -sel clipboard -i >/dev/null 2>&1 & xclip -sel primary -i >/dev/null 2>&1 &"

